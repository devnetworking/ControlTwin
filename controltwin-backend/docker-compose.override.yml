version: "3.9"

services:
  api:
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: controltwin_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@controltwin.io
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - controltwin_net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: controltwin_kafka_ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: controltwin
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - controltwin_net

volumes:
  pgadmin_data:
